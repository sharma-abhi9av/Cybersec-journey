<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cybersec Journey | Security Blog & Writeups</title>
    <link rel="stylesheet" href="assets/css/style.css" />
  </head>
  <body>
    <header class="site-header">
      <div class="container">
        <a class="brand" href="./">Cybersec Journey</a>
        <nav class="nav">
          <a href="./">Home</a>
          <a href="https://github.com/sharma-abhi9av/Cybersec-journey" target="_blank" rel="noreferrer">GitHub</a>
        </nav>
      </div>
    </header>

    <main class="container">
      <section class="hero">
        <h1>Cybersecurity writeups, notes, and practical walkthroughs.</h1>
        <p>
          Personal lab notes, HackTheBox writeups, PortSwigger practice, and practical security learning in one place.
        </p>
        <div class="badges">
          <span class="badge">Writeups</span>
          <span class="badge">Labs</span>
          <span class="badge">Learning Journal</span>
        </div>
      </section>

      <section>
        <div class="section-title">
          <h2>Latest posts</h2>
          <small>Search by title / tags</small>
        </div>
        <div class="search-wrap">
          <input id="search" type="search" placeholder="Try: HTB, CORS, Nocturnal..." />
        </div>
        <div id="postGrid" class="grid"></div>
      </section>
    </main>

    <footer>
      <div class="container">© <span id="year"></span> Cybersec Journey.</div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="assets/js/app.js"></script>
    <script>
      document.getElementById('year').textContent = new Date().getFullYear();
    </script>
  </body>
</html>
